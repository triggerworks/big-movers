<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Movers Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  /* ── Reset & base ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --border: #2a2a2a;
    --accent: #2962ff;
    --accent-hover: #1a4fd4;
    --text: #d1d5db;
    --text-dim: #6b7280;
    --text-bright: #f9fafb;
    --up: #26a69a;
    --down: #ef5350;
    --panel-width: 280px;
    --toolbar-h: 44px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; }

  /* ── Layout ─────────────────────────────────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* Left panel */
  #sidebar {
    width: var(--panel-width);
    min-width: var(--panel-width);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 12px 12px 8px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 { font-size: 15px; font-weight: 700; color: var(--text-bright); margin-bottom: 8px; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .filter-row input, .filter-row select {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 4px 7px; border-radius: 4px; font-size: 12px;
    outline: none;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: var(--accent); }

  #stats { font-size: 11px; color: var(--text-dim); padding: 2px 0 4px; }

  /* Ticker list */
  #ticker-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  #ticker-list::-webkit-scrollbar { width: 5px; }
  #ticker-list::-webkit-scrollbar-track { background: transparent; }
  #ticker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ticker-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    gap: 6px;
  }
  .ticker-item:hover { background: #1e1e1e; }
  .ticker-item.active { background: #1a2a4a; border-left: 3px solid var(--accent); }

  .ticker-left { display: flex; flex-direction: column; min-width: 0; }
  .ticker-symbol { font-weight: 600; font-size: 13px; color: var(--text-bright); }
  .ticker-dates { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .ticker-right { text-align: right; flex-shrink: 0; }
  .ticker-gain { font-weight: 700; font-size: 13px; color: var(--up); }
  .ticker-gain.negative { color: var(--down); }

  /* Right panel */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* Toolbar */
  #toolbar {
    height: var(--toolbar-h);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #chart-title { font-size: 14px; font-weight: 700; color: var(--text-bright); min-width: 80px; }
  #chart-info { font-size: 11px; color: var(--text-dim); flex: 1; }

  .toolbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  .btn-group { display: flex; gap: 2px; }

  .tb-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 9px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: #222; color: var(--text-bright); }
  .tb-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Chart container */
  #chart-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  #chart { width: 100%; height: 100%; }

  /* OHLCV legend overlay */
  #legend {
    position: absolute;
    top: 10px;
    left: 14px;
    z-index: 10;
    background: rgba(13,13,13,0.75);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    pointer-events: none;
    line-height: 1.6;
  }
  #legend .sym { font-weight: 700; font-size: 14px; color: var(--text-bright); }
  #legend .o { color: #888; } #legend .h { color: var(--up); }
  #legend .l { color: var(--down); } #legend .c { color: var(--text-bright); font-weight: 600; }
  #legend .v { color: #aaa; }

  /* Empty state */
  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    pointer-events: none;
  }
  #empty-state .big { font-size: 40px; margin-bottom: 10px; }
  #empty-state p { font-size: 14px; }

  /* Drawing toolbar (bottom) */
  #draw-toolbar {
    height: 36px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    flex-shrink: 0;
  }

  .draw-label { font-size: 11px; color: var(--text-dim); margin-right: 4px; }

  .draw-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.1s;
  }
  .draw-btn:hover { background: #222; color: var(--text-bright); }
  .draw-btn.active { background: #2a1a00; border-color: #ff9800; color: #ff9800; }

  #draw-mode-indicator {
    margin-left: auto;
    font-size: 11px;
    color: #ff9800;
    font-weight: 600;
  }

  /* Scrollbar for webkit */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Loading spinner */
  .spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.6);
    z-index: 20;
  }
  .spinner::after {
    content: '';
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <!-- ── LEFT PANEL ─────────────────────────────────────────────── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Big Movers</h1>
      <div class="filter-row">
        <input id="search-input" type="text" placeholder="Search symbol..." autocomplete="off">
      </div>
      <div class="filter-row">
        <select id="year-filter"><option value="">All Years</option></select>
        <select id="gain-filter">
          <option value="">All Gains</option>
          <option value="100-200">100% – 200%</option>
          <option value="200-500">200% – 500%</option>
          <option value="500-1000">500% – 1000%</option>
          <option value="1000+">Above 1000%</option>
        </select>
      </div>
      <div id="stats">Loading...</div>
    </div>
    <div id="ticker-list"></div>
  </div>

  <!-- ── RIGHT PANEL ────────────────────────────────────────────── -->
  <div id="main">

    <!-- Top toolbar -->
    <div id="toolbar">
      <span id="chart-title">—</span>
      <span id="chart-info"></span>
      <div class="toolbar-sep"></div>

      <!-- Timeframe -->
      <div class="btn-group" id="tf-group">
        <button class="tb-btn active" data-tf="D">D</button>
        <button class="tb-btn" data-tf="W">W</button>
        <button class="tb-btn" data-tf="M">M</button>
      </div>
      <div class="toolbar-sep"></div>

      <!-- Moving averages -->
      <div class="btn-group">
        <button class="tb-btn active" id="btn-ema20">EMA 20</button>
        <button class="tb-btn active" id="btn-ema50">EMA 50</button>
        <button class="tb-btn active" id="btn-sma200">SMA 200</button>
      </div>
      <div class="toolbar-sep"></div>

      <!-- Scale -->
      <button class="tb-btn" id="btn-log">Log</button>
      <button class="tb-btn" id="btn-fit">Fit</button>
    </div>

    <!-- Chart area -->
    <div id="chart-wrap">
      <div id="chart"></div>
      <div id="legend" style="display:none"></div>
      <div id="empty-state">
        <div class="big">📈</div>
        <p>Select a ticker from the list to view its chart</p>
      </div>
    </div>

    <!-- Drawing toolbar -->
    <div id="draw-toolbar">
      <span class="draw-label">Draw:</span>
      <button class="draw-btn active" data-tool="pan" title="Pan (V)">Pan</button>
      <button class="draw-btn" data-tool="hline" title="Horizontal Line (H)">H-Line</button>
      <button class="draw-btn" data-tool="ray" title="Ray (R)">Ray</button>
      <button class="draw-btn" data-tool="segment" title="Segment (S)">Segment</button>
      <div class="toolbar-sep"></div>
      <button class="draw-btn" id="btn-clear-drawings" title="Clear all drawings">Clear</button>
      <span id="draw-mode-indicator"></span>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════════════
const state = {
  allResults: [],       // full list from /api/results
  filtered: [],         // after filters applied
  currentSymbol: null,
  currentTf: 'D',
  rawCandles: [],       // daily OHLCV from server
  logScale: false,
  showEma20: true,
  showEma50: true,
  showSma200: true,
  drawTool: 'pan',
  drawings: [],         // persistent drawing objects [ {type, ...} ]
  drawingInProgress: null,
};

// ═══════════════════════════════════════════════════════════════════════════════
// Chart setup
// ═══════════════════════════════════════════════════════════════════════════════
const chartEl = document.getElementById('chart');
const chart = LightweightCharts.createChart(chartEl, {
  layout: { background: { color: '#0d0d0d' }, textColor: '#d1d5db' },
  grid: { vertLines: { color: '#1e1e1e' }, horzLines: { color: '#1e1e1e' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#2a2a2a' },
  timeScale: { borderColor: '#2a2a2a', timeVisible: true },
  width: chartEl.clientWidth,
  height: chartEl.clientHeight,
});

// Series references
let candleSeries = null;
let volSeries = null;
let ema20Series = null;
let ema50Series = null;
let sma200Series = null;

function initSeries() {
  // Remove existing
  if (candleSeries) try { chart.removeSeries(candleSeries); } catch(_) {}
  if (volSeries)    try { chart.removeSeries(volSeries); } catch(_) {}
  if (ema20Series)  try { chart.removeSeries(ema20Series); } catch(_) {}
  if (ema50Series)  try { chart.removeSeries(ema50Series); } catch(_) {}
  if (sma200Series) try { chart.removeSeries(sma200Series); } catch(_) {}

  candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    priceScaleId: 'right',
  });

  volSeries = chart.addHistogramSeries({
    color: '#26a69a',
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
    scaleMargins: { top: 0.85, bottom: 0 },
  });

  ema20Series = chart.addLineSeries({ color: '#ff9800', lineWidth: 1, priceScaleId: 'right', lastValueVisible: false, priceLineVisible: false });
  ema50Series = chart.addLineSeries({ color: '#2196f3', lineWidth: 1, priceScaleId: 'right', lastValueVisible: false, priceLineVisible: false });
  sma200Series = chart.addLineSeries({ color: '#e040fb', lineWidth: 1, priceScaleId: 'right', lastValueVisible: false, priceLineVisible: false });
}

// Resize observer
new ResizeObserver(() => {
  chart.resize(chartEl.clientWidth, chartEl.clientHeight);
}).observe(chartEl);

// ═══════════════════════════════════════════════════════════════════════════════
// OHLCV Legend
// ═══════════════════════════════════════════════════════════════════════════════
const legend = document.getElementById('legend');

chart.subscribeCrosshairMove(param => {
  if (!candleSeries || !param.time) { legend.style.display = 'none'; return; }
  const c = param.seriesData.get(candleSeries);
  const v = param.seriesData.get(volSeries);
  if (!c) { legend.style.display = 'none'; return; }
  const chg = c.open ? ((c.close - c.open) / c.open * 100).toFixed(2) : '—';
  const chgColor = c.close >= c.open ? '#26a69a' : '#ef5350';
  legend.style.display = 'block';
  legend.innerHTML = `
    <span class="sym">${state.currentSymbol || ''}</span>
    <span style="margin-left:10px;font-size:11px;color:${chgColor}">${chg}%</span><br>
    <span class="o">O ${fmt(c.open)}</span>
    <span style="margin:0 6px" class="h">H ${fmt(c.high)}</span>
    <span class="l">L ${fmt(c.low)}</span>
    <span style="margin-left:6px" class="c">C ${fmt(c.close)}</span><br>
    <span class="v">Vol ${fmtVol(v ? v.value : 0)}</span>
  `;
});

function fmt(n) { return n != null ? Number(n).toFixed(2) : '—'; }
function fmtVol(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

// ═══════════════════════════════════════════════════════════════════════════════
// MA calculations
// ═══════════════════════════════════════════════════════════════════════════════
function calcEMA(candles, period) {
  const k = 2 / (period + 1);
  const result = [];
  let ema = null;
  for (let i = 0; i < candles.length; i++) {
    const c = candles[i];
    ema = ema === null ? c.close : c.close * k + ema * (1 - k);
    if (i >= period - 1) {
      result.push({ time: c.time, value: ema });
    }
  }
  return result;
}

function calcSMA(candles, period) {
  const result = [];
  for (let i = period - 1; i < candles.length; i++) {
    const slice = candles.slice(i - period + 1, i + 1);
    const avg = slice.reduce((s, c) => s + c.close, 0) / period;
    result.push({ time: candles[i].time, value: avg });
  }
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════════
// Timeframe aggregation
// ═══════════════════════════════════════════════════════════════════════════════
function aggregateCandles(daily, tf) {
  if (tf === 'D') return daily;

  const groups = {};
  for (const c of daily) {
    const d = new Date(c.time + 'T00:00:00Z');
    let key;
    if (tf === 'W') {
      // ISO week: find Monday
      const day = d.getUTCDay();
      const diff = day === 0 ? -6 : 1 - day;
      const mon = new Date(d);
      mon.setUTCDate(d.getUTCDate() + diff);
      key = mon.toISOString().slice(0, 10);
    } else {
      key = c.time.slice(0, 7) + '-01';
    }
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  }

  return Object.entries(groups)
    .sort(([a], [b]) => a < b ? -1 : 1)
    .map(([key, bars]) => ({
      time: key,
      open: bars[0].open,
      high: Math.max(...bars.map(b => b.high)),
      low: Math.min(...bars.map(b => b.low)),
      close: bars[bars.length - 1].close,
      volume: bars.reduce((s, b) => s + b.volume, 0),
    }));
}

// ═══════════════════════════════════════════════════════════════════════════════
// Render chart
// ═══════════════════════════════════════════════════════════════════════════════
function renderChart() {
  if (!state.rawCandles.length) return;

  const candles = aggregateCandles(state.rawCandles, state.currentTf);

  initSeries();

  candleSeries.setData(candles.map(c => ({
    time: c.time, open: c.open, high: c.high, low: c.low, close: c.close,
  })));

  volSeries.setData(candles.map(c => ({
    time: c.time, value: c.volume,
    color: c.close >= c.open ? 'rgba(38,166,154,0.4)' : 'rgba(239,83,80,0.4)',
  })));

  // MAs
  ema20Series.setData(state.showEma20 ? calcEMA(candles, 20) : []);
  ema50Series.setData(state.showEma50 ? calcEMA(candles, 50) : []);
  sma200Series.setData(state.showSma200 ? calcSMA(candles, 200) : []);

  ema20Series.applyOptions({ visible: state.showEma20 });
  ema50Series.applyOptions({ visible: state.showEma50 });
  sma200Series.applyOptions({ visible: state.showSma200 });

  // Price scale
  chart.priceScale('right').applyOptions({ mode: state.logScale ? 1 : 0 });

  chart.timeScale().fitContent();
  document.getElementById('empty-state').style.display = 'none';
  legend.style.display = 'none';
  reapplyHlines();
  redrawOverlay();
}

// ═══════════════════════════════════════════════════════════════════════════════
// Load ticker
// ═══════════════════════════════════════════════════════════════════════════════
async function loadTicker(symbol) {
  state.currentSymbol = symbol;
  state.drawings = [];
  pendingPoint = null;
  if (typeof svgOverlay !== 'undefined') svgOverlay.innerHTML = '';
  document.getElementById('chart-title').textContent = symbol;

  // Show spinner
  const wrap = document.getElementById('chart-wrap');
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  wrap.appendChild(spinner);

  try {
    const res = await fetch(`/api/ohlcv?symbol=${encodeURIComponent(symbol)}`);
    if (!res.ok) throw new Error(await res.text());
    state.rawCandles = await res.json();
    renderChart();

    // Update info bar with gain data if available
    // Real CSV columns: symbol, gain_pct, low_date, high_date, year
    const entries = state.allResults.filter(r => (r.symbol || r.Symbol || '').toUpperCase() === symbol);
    if (entries.length) {
      const parts = entries.map(e => {
        const gain = e.gain_pct || e['Gain%'] || '';
        const start = e.low_date || e.StartDate || '';
        const end = e.high_date || e.EndDate || '';
        const yr = e.year || '';
        return [yr, gain ? `+${gain}%` : '', start, end ? `→ ${end}` : ''].filter(Boolean).join(' ');
      });
      document.getElementById('chart-info').textContent = parts.join('  |  ');
    } else {
      document.getElementById('chart-info').textContent = '';
    }
  } catch(e) {
    console.error('Failed to load', symbol, e);
    document.getElementById('chart-info').textContent = 'Error loading data';
  } finally {
    spinner.remove();
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Ticker list
// ═══════════════════════════════════════════════════════════════════════════════
function renderTickerList() {
  const list = document.getElementById('ticker-list');
  list.innerHTML = '';

  if (!state.filtered.length) {
    list.innerHTML = '<div style="padding:20px;color:#6b7280;text-align:center">No results</div>';
    document.getElementById('stats').textContent = '0 results';
    return;
  }

  document.getElementById('stats').textContent = `${state.filtered.length} stocks`;

  const frag = document.createDocumentFragment();
  for (const row of state.filtered) {
    const sym = (row.symbol || row.Symbol || '').toUpperCase();
    const gain = parseFloat(row.gain_pct || row['Gain%'] || row.Gain || 0);
    const start = row.low_date || row.StartDate || '';
    const end = row.high_date || row.EndDate || '';
    const yr = row.year || '';

    const item = document.createElement('div');
    item.className = 'ticker-item' + (sym === state.currentSymbol ? ' active' : '');
    item.dataset.symbol = sym;
    item.innerHTML = `
      <div class="ticker-left">
        <span class="ticker-symbol">${sym}</span>
        <span class="ticker-dates">${yr ? yr + '  ' : ''}${start}${end ? ' – ' + end : ''}</span>
      </div>
      <div class="ticker-right">
        <span class="ticker-gain ${gain < 0 ? 'negative' : ''}">${gain >= 0 ? '+' : ''}${gain.toFixed(0)}%</span>
      </div>
    `;
    item.addEventListener('click', () => {
      document.querySelectorAll('.ticker-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      loadTicker(sym);
    });
    frag.appendChild(item);
  }
  list.appendChild(frag);
}

function applyFilters() {
  const search = document.getElementById('search-input').value.trim().toUpperCase();
  const year = document.getElementById('year-filter').value;
  const gainRange = document.getElementById('gain-filter').value;

  // Parse gain range: "100-200", "200-500", "500-1000", "1000+", or "" (all)
  let gainMin = null, gainMax = null;
  if (gainRange === '1000+') {
    gainMin = 1000;
  } else if (gainRange) {
    const [lo, hi] = gainRange.split('-').map(Number);
    gainMin = lo; gainMax = hi;
  }

  state.filtered = state.allResults.filter(row => {
    const sym = (row.symbol || row.Symbol || '').toUpperCase();
    const gain = parseFloat(row.gain_pct || row['Gain%'] || row.Gain || 0);
    const yr = String(row.year || row.StartDate || '');

    if (search && !sym.includes(search)) return false;
    if (year && yr !== year) return false;
    // Range filter: lower bound inclusive, upper bound inclusive (200% → 100-200 bucket)
    if (gainMin !== null && gain < gainMin) return false;
    if (gainMax !== null && gain > gainMax) return false;
    return true;
  });

  renderTickerList();
}

// ═══════════════════════════════════════════════════════════════════════════════
// Load results
// ═══════════════════════════════════════════════════════════════════════════════
async function loadResults() {
  try {
    const res = await fetch('/api/results');
    state.allResults = await res.json();

    // Populate year filter — real CSV has a 'year' column
    const years = new Set();
    for (const row of state.allResults) {
      const yr = row.year || row.StartDate || '';
      if (yr) years.add(String(yr).slice(0, 4));
    }
    const yearSel = document.getElementById('year-filter');
    [...years].sort().reverse().forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y;
      yearSel.appendChild(opt);
    });

    applyFilters();
  } catch(e) {
    document.getElementById('stats').textContent = 'Failed to load results';
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Toolbar events
// ═══════════════════════════════════════════════════════════════════════════════

// Timeframe buttons
document.querySelectorAll('[data-tf]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tf]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentTf = btn.dataset.tf;
    if (state.rawCandles.length) renderChart();
  });
});

// MA toggles
function wireMABtn(btnId, stateKey) {
  document.getElementById(btnId).addEventListener('click', function() {
    state[stateKey] = !state[stateKey];
    this.classList.toggle('active', state[stateKey]);
    if (state.rawCandles.length) renderChart();
  });
}
wireMABtn('btn-ema20', 'showEma20');
wireMABtn('btn-ema50', 'showEma50');
wireMABtn('btn-sma200', 'showSma200');

// Log scale
document.getElementById('btn-log').addEventListener('click', function() {
  state.logScale = !state.logScale;
  this.classList.toggle('active', state.logScale);
  if (candleSeries) {
    chart.priceScale('right').applyOptions({ mode: state.logScale ? 1 : 0 });
  }
});

// Fit
document.getElementById('btn-fit').addEventListener('click', () => {
  chart.timeScale().fitContent();
});

// ═══════════════════════════════════════════════════════════════════════════════
// Drawing tools
// ═══════════════════════════════════════════════════════════════════════════════

// SVG overlay for segment / ray drawings
const svgOverlay = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svgOverlay.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:5;';
document.getElementById('chart-wrap').appendChild(svgOverlay);

let pendingPoint = null; // first click of a 2-point tool

function redrawOverlay() {
  svgOverlay.innerHTML = '';
  if (!candleSeries) return;
  for (const d of state.drawings) {
    if (d.type !== 'segment' && d.type !== 'ray') continue;
    const x1 = chart.timeScale().timeToCoordinate(d.time1);
    const y1 = candleSeries.priceToCoordinate(d.price1);
    const x2 = chart.timeScale().timeToCoordinate(d.time2);
    const y2 = candleSeries.priceToCoordinate(d.price2);
    if (x1 == null || y1 == null || x2 == null || y2 == null) continue;

    const W = svgOverlay.clientWidth;
    let ex = x2, ey = y2;
    if (d.type === 'ray') {
      const dx = x2 - x1, dy = y2 - y1;
      if (Math.abs(dx) > 0.001) {
        const t = (W - x1) / dx;
        ex = x1 + dx * t; ey = y1 + dy * t;
      }
    }

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', ex); line.setAttribute('y2', ey);
    line.setAttribute('stroke', '#ffeb3b'); line.setAttribute('stroke-width', '1.5');
    svgOverlay.appendChild(line);

    // endpoint dots
    for (const [cx, cy] of [[x1,y1],[x2,y2]]) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
      dot.setAttribute('r', '3'); dot.setAttribute('fill', '#ffeb3b');
      svgOverlay.appendChild(dot);
    }
  }
}

// Redraw segments/rays when the user scrolls or zooms the chart
chart.timeScale().subscribeVisibleLogicalRangeChange(redrawOverlay);

// Re-apply hlines to a new candleSeries instance (called from renderChart after initSeries)
function reapplyHlines() {
  for (const d of state.drawings) {
    if (d.type !== 'hline') continue;
    d._pl = candleSeries.createPriceLine({
      price: d.price,
      color: '#ffeb3b',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title: '',
    });
  }
}

// Click handler — place drawings
chart.subscribeClick(param => {
  if (state.drawTool === 'pan' || !param.time || !candleSeries) return;
  const price = candleSeries.coordinateToPrice(param.point.y);
  if (price == null) return;

  if (state.drawTool === 'hline') {
    const pl = candleSeries.createPriceLine({
      price,
      color: '#ffeb3b',
      lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title: '',
    });
    state.drawings.push({ type: 'hline', price, _pl: pl });
    // Auto-switch back to pan after placing
    setDrawTool('pan');
  } else if (state.drawTool === 'segment' || state.drawTool === 'ray') {
    if (!pendingPoint) {
      pendingPoint = { time: param.time, price };
      document.getElementById('draw-mode-indicator').textContent =
        `${state.drawTool.toUpperCase()} — click second point`;
    } else {
      state.drawings.push({
        type: state.drawTool,
        time1: pendingPoint.time, price1: pendingPoint.price,
        time2: param.time,        price2: price,
      });
      pendingPoint = null;
      redrawOverlay();
      setDrawTool('pan');
    }
  }
});

function setDrawTool(tool) {
  state.drawTool = tool;
  if (tool === 'pan') pendingPoint = null;
  document.querySelectorAll('.draw-btn[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === tool);
  });
  const indicator = document.getElementById('draw-mode-indicator');
  indicator.textContent = tool !== 'pan' ? `Mode: ${tool.toUpperCase()} — click to place` : '';
}

document.querySelectorAll('.draw-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => setDrawTool(btn.dataset.tool));
});

document.getElementById('btn-clear-drawings').addEventListener('click', () => {
  // Remove price lines from the series
  for (const d of state.drawings) {
    if (d.type === 'hline' && d._pl && candleSeries) {
      try { candleSeries.removePriceLine(d._pl); } catch(_) {}
    }
  }
  state.drawings = [];
  pendingPoint = null;
  redrawOverlay();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const map = { v:'pan', h:'hline', r:'ray', s:'segment' };
  const tool = map[e.key.toLowerCase()];
  if (tool) setDrawTool(tool);
  if (e.key === 'Escape') setDrawTool('pan');
});

// ═══════════════════════════════════════════════════════════════════════════════
// Filter events
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('year-filter').addEventListener('change', applyFilters);
document.getElementById('gain-filter').addEventListener('change', applyFilters);

// Init
// ═══════════════════════════════════════════════════════════════════════════════
loadResults();
</script>
